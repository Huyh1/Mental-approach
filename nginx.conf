# ============================================
# 格物心法 知识库 - Nginx 生产环境配置
# ============================================
#
# 部署架构:
#   浏览器 ──→ Nginx (80/443)
#                ├── /static/* ──→ 静态文件（Nginx 直接返回）
#                ├── /          ──→ index.html
#                └── /api/*     ──→ 反向代理 → FastAPI (127.0.0.1:5172)
#
# 使用方式:
#   sudo cp nginx.conf /etc/nginx/sites-available/mental-approach
#   sudo ln -s /etc/nginx/sites-available/mental-approach /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo nginx -s reload

upstream mental_api {
    server 127.0.0.1:5172 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 80;
    # 如有域名，替换为实际域名
    server_name localhost;

    # 文档根目录（指向项目 static 目录）
    root /opt/mental-approach/static;
    index index.html;

    charset utf-8;
    client_max_body_size 10m;

    # ---------- 访问日志 ----------
    access_log /var/log/nginx/mental-approach-access.log;
    error_log  /var/log/nginx/mental-approach-error.log;

    # ---------- 安全头部 ----------
    add_header X-Content-Type-Options  "nosniff"          always;
    add_header X-Frame-Options         "SAMEORIGIN"       always;
    add_header X-XSS-Protection        "1; mode=block"    always;
    add_header Referrer-Policy         "no-referrer-when-downgrade" always;

    # ---------- Gzip 压缩 ----------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        text/html
        image/svg+xml;
    gzip_disable "msie6";

    # ---------- 静态资源 ----------
    # 带版本号的静态文件长期缓存
    location ~* \.(ico|png|jpg|jpeg|gif|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # CSS / JS 短期缓存
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # 其他静态文件
    location /static/ {
        expires 14d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ---------- 前端页面 ----------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- API 反向代理 ----------
    location /api/ {
        # 代理到 FastAPI 后端
        proxy_pass http://mental_api;
        proxy_http_version 1.1;

        # 请求头透传
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # 超时设置（分析接口可能耗时较长）
        proxy_read_timeout      60s;
        proxy_connect_timeout   10s;
        proxy_send_timeout      30s;

        # 缓冲设置
        proxy_buffering         on;
        proxy_buffer_size       8k;
        proxy_buffers           32 8k;
    }

    # ---------- 禁止访问隐藏文件 ----------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

